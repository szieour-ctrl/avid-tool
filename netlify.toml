[build]
  publish = "public"
  command = "npm install"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# 30-second timeout for the fill-avid function (Claude call + PDF fill)
[functions."fill-avid"]
  timeout = 30

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
